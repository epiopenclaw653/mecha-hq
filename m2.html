<title>MECHA — Mecha Mail</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--bg2:#0e0e0e;--bg3:#141414;--cyan:#00e5ff;--cyan-dim:rgba(0,229,255,0.15);--cyan-glow:rgba(0,229,255,0.25);--mecha:#E8593C;--light:#e8e6e1;--muted:#7a7872;--border:rgba(0,229,255,0.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--light);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
nav{position:fixed;top:0;left:0;right:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(10,10,10,0.88);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px}
.nav-logo-link{text-decoration:none;display:flex;align-items:baseline}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:35px;letter-spacing:6px;color:var(--mecha)}
.nav-icons{display:flex;gap:16px;align-items:center}
.nav-icon{padding:6px 14px;cursor:pointer;color:var(--muted);transition:all 0.3s;position:relative;text-decoration:none;display:flex;flex-direction:column;align-items:center;justify-content:center}
.nav-icon:hover{color:var(--cyan)}
.nav-icon.active{color:var(--light)}
.nav-icon.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60%;height:2.5px;background:var(--cyan);border-radius:2px}
.nav-icon svg{width:25px;height:25px;vertical-align:middle}
.nav-abbr{display:none;font-size:9px;letter-spacing:1.5px;margin-top:2px;font-family:'Bebas Neue',sans-serif}
.nav-icon:hover .nav-abbr{display:block}
.nav-right{display:flex;gap:8px;align-items:center}
.nav-right a{color:var(--muted);text-decoration:none;transition:color 0.3s;display:flex;align-items:center;padding:8px}
.nav-right a:hover{color:var(--cyan)}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 24px 60px}
.uc-img{max-width:600px;width:100%;border-radius:12px;margin-bottom:32px}
.uc-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,5vw,44px);letter-spacing:4px;margin-bottom:12px;color:var(--cyan)}
.uc-desc{color:var(--muted);font-size:16px;font-weight:300;max-width:500px;line-height:1.7;margin-bottom:32px}
.btn-back{display:inline-block;padding:12px 28px;background:transparent;color:var(--cyan);font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;border-radius:8px;text-decoration:none;transition:all 0.3s;border:2px solid var(--border)}
.btn-back:hover{border-color:var(--cyan);box-shadow:0 0 20px var(--cyan-dim)}
footer{padding:24px;border-top:1px solid var(--border);text-align:center}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;color:var(--mecha);margin-bottom:8px}
.footer-copy{color:var(--muted);font-size:11px}
@media(max-width:768px){.nav-icons{display:none}}
</style>
</head>
